name: SpringBoot_DockerImage

on:
  push:
    branches: [ master ]

jobs:
  springboot_deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Java 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Build JAR with Maven
        run: mvn package -DskipTests --batch-mode

      - name: Verify JAR
        run: ls -la target/*.jar

      - name: Docker Login
        run: echo "${{ secrets.DOCKER_PASSWORD }}" | docker login -u "${{ secrets.DOCKER_USER }}" --password-stdin

      - name: Build Docker image
        run: |
          docker build \
            -t ${{ secrets.DOCKER_USER }}/mi-app:${{ github.sha }} \
            -t ${{ secrets.DOCKER_USER }}/mi-app:latest \
            .

      - name: Push Docker images
        run: |
          docker push ${{ secrets.DOCKER_USER }}/mi-app:${{ github.sha }}
          docker push ${{ secrets.DOCKER_USER }}/mi-app:latest
